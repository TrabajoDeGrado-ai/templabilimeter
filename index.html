    <body>
        
        <header class="encabezado">
            <h1>TEMPLABILIMETER</h1>
        </header>
        <main>
            <div class="Pedir-datos">
                <p>A continuación, podrá ingresar la composición química del acero en estudio, lo que permitirá calcular el Di (diámetro ideal) y construir la curva Jominy para ese acero.</p>
                <form action="" class="Formulario-Composicion">
                    <input class="contenedor" type="number" step="0.01" name="Carbono" placeholder="Ingrese el contenido en Carbono">
                    <input class="contenedor" type="number" step="0.01" name="Manganeso" placeholder="Ingrese el contenido en Manganeso">
                    <input class="contenedor" type="number" step="0.01" name="Silicio" placeholder="Ingrese el contenido en Silicio">
                    <input class="contenedor" type="number" step="0.01" name="Niquel" placeholder="Ingrese el contenido en Niquel">
                    <input class="contenedor" type="number" step="0.01" name="Cromo" placeholder="Ingrese el contenido en Cromo">
                    <input class="contenedor" type="number" step="0.01" name="Molibdeno" placeholder="Ingrese el contenido en Molibdeno">
                    <input class="contenedor" type="number" step="0.01" name="Cobre" placeholder="Ingrese el contenido en Cobre">
                    <input class="contenedor" type="number" step="0.01" name="Vanadio" placeholder="Ingrese el contenido en Vanadio">
                    <input class="contenedor" type="number" step="0.01" name="Zirconio" placeholder="Ingrese el contenido en Zirconio">
                </form>
                <button class="boton"  type="button">Calcular</button>
            </div>
        </main>
        <div id="toast" class="toast"></div>
